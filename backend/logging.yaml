# ─────────────────────────────────────────────────────────────────────────────
# TraceData Backend — Logging Configuration
#
# Loaded at startup by app/core/logging.py via Python's dictConfig().
# Changing this file restarts the logging behaviour WITHOUT touching app code.
#
# Handler map:
#   console  → Human-readable, coloured (dev-friendly)
#   file     → JSON-like lines written to logs/backend.log (ship to CloudWatch)
#
# Log level hierarchy (most → least verbose):
#   DEBUG → INFO → WARNING → ERROR → CRITICAL
# ─────────────────────────────────────────────────────────────────────────────

version: 1
disable_existing_loggers: false   # Keep uvicorn and SQLAlchemy loggers alive

# ── Formatters ────────────────────────────────────────────────────────────────
formatters:

  # Human-readable: best for local development
  console:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%H:%M:%S"

  # JSON: one JSON object per line — parsed by Promtail/Loki for field queries
  # Fields: timestamp, level, logger, request_id, message
  json:
    (): pythonjsonlogger.jsonlogger.JsonFormatter
    format: "%(asctime)s %(levelname)s %(name)s %(request_id)s %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"
    rename_fields:
      levelname: level
      asctime: timestamp
      name: logger

# ── Handlers ──────────────────────────────────────────────────────────────────
handlers:

  # Stdout — always on; Docker/Promtail captures this
  # Uses JSON in production (APP_ENV=production), console format otherwise
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: json
    stream: ext://sys.stdout

  # Rotating file — useful for local dev; in prod prefer stdout → log aggregator
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/backend.log
    maxBytes: 10485760   # 10 MB per file
    backupCount: 5        # Keep 5 rotated files = max 50 MB on disk
    encoding: utf8

# ── Loggers ───────────────────────────────────────────────────────────────────
loggers:

  # Suppress SQLAlchemy's per-row echo in INFO; DEBUG will show full SQL
  sqlalchemy.engine:
    level: WARNING
    propagate: false

  # Uvicorn access logs — keep INFO to see HTTP request lines
  uvicorn.access:
    level: INFO
    propagate: false

  # Our app logger — root namespace for all app.* loggers
  app:
    level: DEBUG
    propagate: true

  # Our core logger — root namespace for all core.* loggers
  core:
    level: DEBUG
    propagate: true

# ── Root Logger ───────────────────────────────────────────────────────────────
root:
  level: INFO
  handlers:
    - console
    - file
