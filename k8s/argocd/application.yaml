apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tracedata
  namespace: argocd
  # Ensure ArgoCD deletes all managed resources when this Application is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/tracedata-ai/tracedata-ai-monorepo.git
    targetRevision: main
    path: k8s
    # Kustomize is auto-detected from kustomization.yaml in k8s/

  destination:
    server: https://kubernetes.default.svc
    namespace: tracedata

  syncPolicy:
    automated:
      prune: true       # Remove resources deleted from Git
      selfHeal: true    # Revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true   # Creates tracedata namespace if absent
      - ServerSideApply=true   # Handles large resources like Grafana dashboards
