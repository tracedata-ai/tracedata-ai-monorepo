apiVersion: v1
kind: ConfigMap
metadata:
  name: tracedata-frontend-config
  namespace: tracedata
  labels:
    app: tracedata-frontend
    tier: frontend
    environment: prod
data:
  NODE_ENV: "production"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  # NOTE: NEXT_PUBLIC_* vars below are Next.js build-time variables — baked into
  # the JS bundle at image build and have no effect at runtime. These entries are
  # informational only. Set the corresponding vars in GitHub Actions repo settings
  # (vars.NEXT_PUBLIC_API_URL, vars.NEXT_PUBLIC_MAPBOX_TOKEN, vars.NEXT_PUBLIC_OWM_TOKEN)
  # before publishing the frontend image.
  NEXT_PUBLIC_API_URL: "http://tracedata-api-service.tracedata.svc.cluster.local:8000/api/v1"
  NEXT_PUBLIC_MAPBOX_TOKEN: ""  # baked at build time via vars.NEXT_PUBLIC_MAPBOX_TOKEN
  NEXT_PUBLIC_OWM_TOKEN: ""     # baked at build time via vars.NEXT_PUBLIC_OWM_TOKEN
