apiVersion: v1
kind: ConfigMap
metadata:
  name: tracedata-orchestrator-config
  namespace: tracedata
  labels:
    app: tracedata-orchestrator
    tier: worker
    environment: prod
data:
  APP_ENV: "production"
  DEBUG: "false"
  PYTHONPATH: "/app"
  DATABASE_URL: "postgresql+asyncpg://tracedatauser:CHANGE_ME_BEFORE_DEPLOY@tracedata-db-service.tracedata.svc.cluster.local:5432/tracedata"
  REDIS_URL: "redis://tracedata-redis-service.tracedata.svc.cluster.local:6379/0"
  LOG_LEVEL: "INFO"
