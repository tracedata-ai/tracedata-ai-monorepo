apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracedata-api
  namespace: tracedata
  labels:
    app: tracedata-api
    tier: backend
    environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracedata-api
  template:
    metadata:
      labels:
        app: tracedata-api
        tier: backend
        environment: prod
    spec:
      containers:
        - name: tracedata-api
          image: sreerajrone/tracedata-backend-agent-api:sha-f2005b3  # backend-tag
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          command:
            - ./entrypoint.sh
          envFrom:
            - configMapRef:
                name: tracedata-api-config
            - secretRef:
                name: tracedata-api-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
