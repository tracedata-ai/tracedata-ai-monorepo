apiVersion: v1
kind: ConfigMap
metadata:
  name: tracedata-api-config
  namespace: tracedata
  labels:
    app: tracedata-api
    tier: backend
    environment: prod
data:
  APP_ENV: "production"
  DEBUG: "false"
  PYTHONPATH: "/app"
  DATABASE_URL: "postgresql+asyncpg://tracedatauser:CHANGE_ME_BEFORE_DEPLOY@tracedata-db-service.tracedata.svc.cluster.local:5432/tracedata"
  REDIS_URL: "redis://tracedata-redis-service.tracedata.svc.cluster.local:6379/0"
  RESET_DB: "false"
  LOG_LEVEL: "INFO"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"
  # Simulation flags — set to "true" only for demo environments
  DEMO_RESET: "false"
  SIM_LOOP: "false"
  SIM_INTERVAL: "30"
  SIM_EVENT_DELAY: "0.5"
  SIM_TRUCK_DELAY: "5.0"
  SIM_TRUCK_COUNT: "10"
