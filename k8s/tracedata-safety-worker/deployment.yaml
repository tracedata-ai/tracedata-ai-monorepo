apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracedata-safety-worker
  namespace: tracedata
  labels:
    app: tracedata-safety-worker
    tier: worker
    environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracedata-safety-worker
  template:
    metadata:
      labels:
        app: tracedata-safety-worker
        tier: worker
        environment: prod
    spec:
      containers:
        - name: tracedata-safety-worker
          image: sreerajrone/tracedata-backend-agent-api:sha-74ace4d  # backend-tag
          imagePullPolicy: Always
          command:
            - celery
            - "-A"
            - celery_app
            - worker
            - "-Q"
            - "td:agent:safety"
            - "-n"
            - "safety@%h"
            - "--loglevel=info"
          envFrom:
            - configMapRef:
                name: tracedata-safety-worker-config
            - secretRef:
                name: tracedata-api-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
