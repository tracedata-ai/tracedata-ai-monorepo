# Helm values for Promtail (log shipper — runs as DaemonSet on every node)
# Install: helm install promtail grafana/promtail \
#   --namespace monitoring --create-namespace \
#   -f k8s/monitoring/promtail-values.yaml

config:
  clients:
    - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push

  snippets:
    # Add Kubernetes metadata labels to every log line
    pipelineStages:
      - cri: {}
      - json:
          expressions:
            level: level
            logger: logger
            request_id: request_id
      - labels:
          level:
          logger:
      - labeldrop:
          - filename
    extraRelabelConfigs:
      - action: replace
        source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - action: replace
        source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - action: replace
        source_labels: [__meta_kubernetes_container_name]
        target_label: container

tolerations:
  - effect: NoSchedule
    operator: Exists
