apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  tracedata-api.json: |
    {
      "uid": "tracedata-api",
      "title": "TraceData — API Health",
      "tags": ["tracedata", "api"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"tracedata\"}[1m])) by (handler)",
              "legendFormat": "{{handler}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 2,
          "title": "P95 Latency (ms)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"tracedata\"}[5m])) by (handler, le)) * 1000",
              "legendFormat": "p95 {{handler}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ms", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 3,
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"tracedata\", status=~\"5..\"}[1m])) by (handler)",
              "legendFormat": "5xx {{handler}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "fixed", "fixedColor": "red" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.1 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "API Pod CPU",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(process_cpu_seconds_total{namespace=\"tracedata\"}[1m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 5,
          "title": "API Pod Memory (RSS)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "process_resident_memory_bytes{namespace=\"tracedata\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 6,
          "title": "HTTP Status Breakdown",
          "type": "piechart",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(http_requests_total{namespace=\"tracedata\"}[1h])) by (status)",
              "legendFormat": "HTTP {{status}}"
            }
          ]
        }
      ]
    }
