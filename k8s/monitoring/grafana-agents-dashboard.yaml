apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-agents-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  tracedata-agents.json: |
    {
      "uid": "tracedata-agents",
      "title": "TraceData — Agent Pipeline",
      "tags": ["tracedata", "agents"],
      "timezone": "browser",
      "refresh": "15s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Pod Status — Workers",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "kube_pod_status_phase{namespace=\"tracedata\", phase=\"Running\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "Running", "color": "green" }, "0": { "text": "Down", "color": "red" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Pod Restarts — Last 1h",
          "type": "stat",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"tracedata\"}[1h])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Container CPU Usage — Workers",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"tracedata\", container!=\"\", container!=\"POD\"}[2m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 4,
          "title": "Container Memory — Workers",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"tracedata\", container!=\"\", container!=\"POD\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 5,
          "title": "Redis — Connected Clients",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "redis_connected_clients{namespace=\"tracedata\"}",
              "legendFormat": "clients"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "blue" } }
          }
        },
        {
          "id": 6,
          "title": "Redis — Memory Used",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "redis_memory_used_bytes{namespace=\"tracedata\"}",
              "legendFormat": "used"
            },
            {
              "expr": "redis_memory_max_bytes{namespace=\"tracedata\"}",
              "legendFormat": "max"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 7,
          "title": "Redis — Commands/sec",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(redis_commands_processed_total{namespace=\"tracedata\"}[1m])",
              "legendFormat": "commands/s"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ops", "color": { "mode": "fixed", "fixedColor": "purple" } }
          }
        },
        {
          "id": 8,
          "title": "Redis — Keyspace (active keys)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 24, "w": 8, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "redis_db_keys{namespace=\"tracedata\"}",
              "legendFormat": "db{{db}}"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 9,
          "title": "Redis — Expired Keys/sec",
          "type": "stat",
          "gridPos": { "x": 8, "y": 24, "w": 8, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(redis_expired_keys_total{namespace=\"tracedata\"}[1m])",
              "legendFormat": "expired/s"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 10,
          "title": "Redis — Hit Rate",
          "type": "gauge",
          "gridPos": { "x": 16, "y": 24, "w": 8, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(redis_keyspace_hits_total{namespace=\"tracedata\"}[5m]) / (rate(redis_keyspace_hits_total{namespace=\"tracedata\"}[5m]) + rate(redis_keyspace_misses_total{namespace=\"tracedata\"}[5m]))",
              "legendFormat": "hit rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "green", "value": 0.8 }
                ]
              }
            }
          }
        }
      ]
    }
