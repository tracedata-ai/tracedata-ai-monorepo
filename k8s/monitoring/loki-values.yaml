# Helm values for Loki (single binary — suitable for staging/small prod)
# Install: helm install loki grafana/loki \
#   --namespace monitoring --create-namespace \
#   -f k8s/monitoring/loki-values.yaml

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: do-block-storage
    size: 10Gi

# Disable components not needed in single-binary mode
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable caches — not needed for single-binary / small cluster
chunksCache:
  enabled: false
resultsCache:
  enabled: false
