apiVersion: v1
kind: Service
metadata:
  name: tracedata-redis-service
  namespace: tracedata
  labels:
    app: tracedata-redis
    tier: cache
    environment: prod
spec:
  type: ClusterIP
  selector:
    app: tracedata-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
    - name: metrics
      port: 9121
      targetPort: 9121
      protocol: TCP
