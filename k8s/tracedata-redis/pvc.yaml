apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tracedata-redis-pvc
  namespace: tracedata
  labels:
    app: tracedata-redis
    tier: cache
    environment: prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: do-block-storage
