version: '3.8'

# ── How to run ────────────────────────────────────────────────────────────────
#
#  Frontend only (standalone):
#    docker compose up frontend
#
#  Full stack (frontend + backend + db):
#    docker compose --profile full up
#
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Next.js Frontend ────────────────────────────────────────────────────────
  # Runs independently – no depends_on backend.
  # NEXT_PUBLIC_* vars are baked in at build time; override via build.args.
  frontend:
    build:
      context: ./frontend
      args:
        # Override this when running the full stack so the browser
        # can reach the backend container by its published port.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_ENABLE_CHATBOT: ${NEXT_PUBLIC_ENABLE_CHATBOT:-true}
        NEXT_PUBLIC_AUTH_DOMAIN: ${NEXT_PUBLIC_AUTH_DOMAIN:-auth.tracedata.ai}
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  # Only started when --profile full is passed.
  backend:
    profiles: [full]
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/tracedata_db
    depends_on:
      - db
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  # Only started when --profile full is passed.
  db:
    profiles: [full]
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tracedata_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
