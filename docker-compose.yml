
# ─────────────────────────────────────────────────────────────────────────────
# TraceData — Docker Compose
#
# Services:
#   backend   → FastAPI REST API + LangGraph agents (port 8000)
#   frontend  → Next.js dashboard (port 3000)
#   db        → PostgreSQL 16 + pgvector (port 5432)
#   redis     → In-memory broker for Celery workers (port 6379)
#
# Usage:
#   Full stack:      docker compose up --build
#   Backend + DB:    docker compose up backend db redis --build
#   Frontend only:   docker compose up frontend
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Container 1: API (FastAPI) ────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: td-api
    env_file:
      - .env
    command: sh -c "python -m scripts.bootstrap_sg_baseline && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tracedata
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - DEMO_RESET=true
      - SIM_LOOP=true
      - SIM_INTERVAL=30
      - SIM_EVENT_DELAY=0.5
      - SIM_TRUCK_DELAY=5.0
      - SIM_TRUCK_COUNT=10
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure

  # ── Container 2: Ingestion ──────────────────────────────────────────────────
  ingestion:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: td-ingestion
    env_file:
      - .env
    command: python -m core.ingestion.worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tracedata
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: always

  # ── Container 3: Orchestrator ───────────────────────────────────────────────
  orchestrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: td-orchestrator
    env_file:
      - .env
    command: python -m agents.worker orchestrator
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tracedata
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: always

  # ── Container 4: Safety Worker (Celery) ─────────────────────────────────────
  safety_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: td-safety
    env_file:
      - .env
    working_dir: /app
    command: celery -A celery_app worker -Q td:agent:safety -n safety@%h --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      - redis
    restart: always

  # ── Container 5: Scoring Worker (Celery) ────────────────────────────────────
  scoring_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: td-scoring
    env_file:
      - .env
    working_dir: /app
    command: celery -A celery_app worker -Q td:agent:scoring -n scoring@%h --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tracedata
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: always

  # ── Container 6: Support Worker (Celery) ────────────────────────────────────
  support_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: td-support
    env_file:
      - .env
    working_dir: /app
    command: celery -A celery_app worker -Q td:agent:support -n support@%h --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      - redis
    restart: always

  # ── Container 7: Sentiment Worker (Celery) ──────────────────────────────────
  sentiment_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: td-sentiment
    env_file:
      - .env
    working_dir: /app
    command: celery -A celery_app worker -Q td:agent:sentiment -n sentiment@%h --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      - redis
    restart: always

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    container_name: tracedata-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    restart: always

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────────
  db:
    image: ankane/pgvector:latest
    container_name: tracedata-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tracedata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracedata"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ── Redis ────────────────────────────────────────────────────────────────────
  # Used as the Celery message broker and result backend.
  # Also used for agent context caching (future: conversation state).
  redis:
    image: redis:7-alpine
    container_name: tracedata-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
