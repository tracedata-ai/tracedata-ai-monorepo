name: "🐍 CI Backend API — Lint, Test & Security"

# ─────────────────────────────────────────────────────────────────────────────
# Triggers on changes to the backend/ source, the CI file itself,
# or manually via workflow_dispatch (useful for debugging).
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend-api.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend-api.yaml"
  workflow_dispatch:

# Cancel in-progress runs for the same branch to avoid wasted compute
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_PYTHON: "3.11"
  # The working directory for all `run` steps
  WORKING_DIR: backend

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: Lint & Type Check
# Fails fast — no point running tests if the code doesn't parse.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: 🧹 Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (with dev extras for ruff + mypy)
        run: uv sync --frozen --extra dev

      - name: 🔍 Ruff — lint check
        # ruff check fails on any lint error; --output-format=github
        # annotates the PR diff with inline error comments
        run: uv run ruff check . --output-format=github

      - name: 🔍 Ruff — format check
        run: uv run ruff format --check .

      - name: 🔬 Mypy — static type check
        run: uv run mypy app --ignore-missing-imports --no-error-summary

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: Unit Tests with PostgreSQL service container
# Spins up a real postgres:16 container so SQLAlchemy can run
# create_all() and verify the ORM models are wired correctly.
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    # GitHub Actions service containers — available at localhost inside the job
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tracedata_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Override DATABASE_URL for the test job
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/tracedata_test
      APP_ENV: test
      DEBUG: "false"
      RESET_DB: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (all extras)
        run: uv sync --frozen --extra dev

      - name: 🧪 Run pytest with coverage
        run: |
          uv run pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            tests/
        # Don't fail the build yet if there are no tests — allows us to
        # bootstrap CI before the test suite is written.
        # Remove this flag once tests exist.
        continue-on-error: true

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-backend-api
          path: backend/coverage.xml
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: Software Composition Analysis (SCA)
# pip-audit checks all installed packages against known CVE databases.
# continue-on-error: true — advisory; won't block merge until baseline set.
# ─────────────────────────────────────────────────────────────────────────────
  security-sca:
    name: 🔐 SCA — pip-audit
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    continue-on-error: true   # Informational until a CVE baseline is set

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run pip-audit
        # uvx pulls pip-audit from PyPI without polluting the project venv
        run: uvx pip-audit --requirement <(uv export --format requirements-txt --no-dev)

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4: Docker Build Check
# Verifies Dockerfile.api builds successfully without pushing.
# Catches missing COPY targets, broken layers, etc.
# ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.api
          push: false
          tags: tracedata-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5: CI Summary (always runs, even on failure)
# Writes a Markdown table to the GitHub Actions Job Summary tab.
# ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, security-sca, docker-build]
    if: always()

    steps:
      - name: Write CI summary
        run: |
          echo "## 🐍 Backend API CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧹 Lint & Type Check | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests        | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 SCA (pip-audit)   | ${{ needs.security-sca.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Build      | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Component:** Backend API (FastAPI + Python 3.11)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
