name: "🐍 CI Backend API — Lint, Test & Security"

# ─────────────────────────────────────────────────────────────────────────────
# Triggers on changes to the backend/ source, the CI file itself,
# or manually via workflow_dispatch (useful for debugging).
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
      - "integration/**"
      - "experiment/**"
    paths:
      - "backend/api/**"
      - "backend/common/**"
      - "backend/core/**"
      - "backend/tests/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - ".github/workflows/ci-backend-api.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/api/**"
      - "backend/common/**"
      - "backend/core/**"
      - "backend/tests/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - ".github/workflows/ci-backend-api.yaml"
  workflow_dispatch:

# Cancel in-progress runs for the same branch to avoid wasted compute
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_PYTHON: "3.11"
  # The working directory for all `run` steps
  WORKING_DIR: backend

# ─────────────────────────────────────────────────────────────────────────────
# JOB DEPENDENCY GRAPH
#
#  lint ──────────────────────┐
#  type-check ────────────────┤
#  unit-test ─────────────────┤──► build ──► docker (Build → Trivy Scan)
#  security-sca ──────────────┘                  └──► summary
#
#  Note: Backend-specific SAST (Bandit) is included in lint.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: Lint & Type Check
# Fails fast — no point running tests if the code doesn't parse.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. LINT ───────────────────────────────────────────────────────────────
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (with dev extras)
        run: uv sync --frozen --extra dev

      - name: 🔐 Check lockfile sync
        run: uv lock --check

      - name: 🔍 Black — format check
        run: uv run black --check .

      - name: 🔍 Ruff — lint check
        # Informational-only: report lint findings without failing CI.
        continue-on-error: true
        run: uv run ruff check .

      - name: 🔐 Bandit — security scan (SAST)
        run: uv run bandit -r api/ -ll

  # ── 2. TYPE CHECK ─────────────────────────────────────────────────────────
  type-check:
    name: 🔬 Type Check
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (with dev extras)
        run: uv sync --frozen --extra dev

      - name: Mypy static type check
        run: uv run mypy api --ignore-missing-imports --no-error-summary

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: Unit Tests with PostgreSQL service container
# Spins up a real postgres:16 container so SQLAlchemy can run
# create_all() and verify the ORM models are wired correctly.
# ─────────────────────────────────────────────────────────────────────────────
  # ── 3. UNIT TESTS ─────────────────────────────────────────────────────────
  unit-test:
    name: 🧪 Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: type-check
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    # GitHub Actions service containers — available at localhost inside the job
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tracedata_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Override DATABASE_URL for the test job
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/tracedata_test
      APP_ENV: test
      DEBUG: "false"
      RESET_DB: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (all extras)
        run: uv sync --frozen --extra dev

      - name: 🧪 Run pytest with coverage
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uv run pytest \
              --cov=api \
              --cov-report=xml \
              --cov-report=term-missing \
              --cov-fail-under=1 \
              -v \
              -m "not nightly" \
              tests/
          else
            uv run pytest \
              --cov=api \
              --cov-report=xml \
              --cov-report=term-missing \
              --cov-fail-under=1 \
              -v \
              tests/
          fi

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-backend-api
          path: backend/coverage.xml
          retention-days: 7

  # ── 4. SCA — pip-audit ────────────────────────────────────────────────────
  security-sca:
    name: 🔐 SCA — pip-audit
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run pip-audit
        # uvx pulls pip-audit from PyPI without polluting the project venv
        run: uvx pip-audit --requirement <(uv export --format requirements-txt --no-dev --no-emit-project)

  # ── 5. BUILD ──────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Backend API
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test, security-sca]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (with dev extras)
        run: uv sync --frozen --extra dev

      - name: Compile backend API modules
        run: uv run python -m compileall api common core

  # ── 6. DOCKER (Build → Trivy Scan) ───────────────────────────────────────
  docker:
    name: 🐳 Docker
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build backend API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.api
          load: true
          tags: tracedata-backend-api:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🛡️ Trivy - Scan for CRITICAL & HIGH CVEs
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
        with:
          image-ref: tracedata-backend-api:scan
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

  # ── 7. SUMMARY ────────────────────────────────────────────────────────────
  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test, security-sca, build, docker]
    if: always()

    steps:
      - name: Write CI summary
        run: |
          echo "## 🐍 Backend API CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧹 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔬 Type Check | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests | ${{ needs.unit-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 SCA (pip-audit) | ${{ needs.security-sca.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker (Build → Trivy Scan) | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Component:** Backend API (FastAPI + Python 3.11)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

  notify-slack:
    name: 📣 Slack Notification
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test, security-sca, build, docker, summary]
    if: always()
    steps:
      - name: Post CI result to Slack
        if: ${{ secrets.SLACK_CI_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_CI_WEBHOOK_URL }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPE_RESULT: ${{ needs.type-check.result }}
          TEST_RESULT: ${{ needs.unit-test.result }}
          SCA_RESULT: ${{ needs.security-sca.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          STATUS="PASS"
          for r in "$LINT_RESULT" "$TYPE_RESULT" "$TEST_RESULT" "$SCA_RESULT" "$BUILD_RESULT" "$DOCKER_RESULT"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              STATUS="FAIL"
              break
            fi
          done
          RUN_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
          MSG="Backend API CI: $STATUS | repo=$REPO | branch=$BRANCH | event=$EVENT | $RUN_URL"
          curl -X POST -H "Content-type: application/json" --data "{\"text\":\"$MSG\"}" "$SLACK_WEBHOOK"

