name: "🏗️ CI Frontend - Build, Lint & Type Check"

on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  ci:
    name: 🏗️ Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🧪 Lint Code
        working-directory: frontend
        run: npm run lint

      - name: 🔍 TypeScript Type Check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: 🏗️ Build Production Bundle
        working-directory: frontend
        run: npm run build

      - name: 🔐 Security Audit (npm)
        working-directory: frontend
        run: npm audit --audit-level=high

  docker-build-push:
    name: 🐳 Docker Build, Scan & Push
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/tracedata-frontend
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v6
        with:
          context: frontend
          load: true
          tags: tracedata-frontend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🛡️ Trivy Container Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
        with:
          image-ref: tracedata-frontend:scan
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [ci, docker-build-push]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          echo "## Frontend CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint, Type Check & Build | ${{ needs.ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build, Scan & Push | ${{ needs.docker-build-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Component:** Frontend (Next.js + React + TypeScript)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
