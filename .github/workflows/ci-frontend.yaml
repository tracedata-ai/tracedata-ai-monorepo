name: "🏗️ CI Frontend - Build, Lint & Type Check"

on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  ci:
    name: 🏗️ Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🧪 Lint Code
        working-directory: frontend
        run: npm run lint

      - name: 🔍 TypeScript Type Check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: 🏗️ Build Production Bundle
        working-directory: frontend
        run: npm run build

      - name: 🔐 Security Audit
        working-directory: frontend
        run: npm audit --audit-level=high

  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: ci
    if: always()
    steps:
      - name: Check CI Status
        run: |
          echo "## Frontend CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Quality | ${{ needs.ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Component:** Frontend (Next.js 16 + React 19 + TypeScript)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
