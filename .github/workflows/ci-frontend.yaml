name: "🏗️ CI Frontend - Build, Test & Security Scan"

on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────────────────────
# JOB DEPENDENCY GRAPH
#
#  lint ──────────────────────┐
#  type-check ────────────────┤──► build ──► docker-build-push  (PR/main only)
#  npm-audit ─────────────────┘         └──► dast-zap           (PR/main only)
#  codeql-sast                          (PR/main only, independent)
#                                            └──► summary
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. LINT ─────────────────────────────────────────────────────────────────
  lint:
    name: 🧪 Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  # ── 2. TYPE CHECK ────────────────────────────────────────────────────────────
  type-check:
    name: 🔍 TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tsc --noEmit
        working-directory: frontend
        run: npx tsc --noEmit

  # ── 3. UNIT TESTS ────────────────────────────────────────────────────────────
  # Uncomment when frontend tests are added.
  #
  # unit-test:
  #   name: 🧪 Unit Tests & Coverage
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #     - name: Set up Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: ${{ env.NODE_VERSION }}
  #         cache: "npm"
  #         cache-dependency-path: frontend/package-lock.json
  #     - name: Install dependencies
  #       working-directory: frontend
  #       run: npm ci
  #     - name: Run tests
  #       working-directory: frontend
  #       run: npm run test
  #     - name: Run coverage
  #       working-directory: frontend
  #       run: npm run test:coverage
  #     - name: Upload coverage report
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: frontend-coverage-report
  #         path: frontend/coverage/
  #         retention-days: 7

  # ── 4. SCA — npm audit ───────────────────────────────────────────────────────
  npm-audit:
    name: 🔐 SCA - npm Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (no audit)
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: Run npm audit
        working-directory: frontend
        # Produce JSON report even on failure; fail job only on HIGH+
        run: npm audit --json > npm-audit.json || true

      - name: Fail on high severity vulnerabilities
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit.json
          retention-days: 7

  # ── 5. BUILD ─────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

  # ── 6. SAST — CodeQL ────────────────────────────────────────────────────────
  codeql-sast:
    name: ☢️ SAST - CodeQL
    runs-on: ubuntu-latest
    # Only scan on PRs and merges to main — not every feature branch push
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    permissions:
      actions: read
      contents: read
      security-events: write
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          source-root: frontend

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ── 7. DOCKER BUILD, TRIVY SCAN & PUSH ───────────────────────────────────────
  docker-build-push:
    name: 🐳 Docker Build, Scan & Push
    runs-on: ubuntu-latest
    needs: build
    # Build + scan on PRs (quality gate). Push only on merge to main.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/tracedata-frontend
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v6
        with:
          context: frontend
          load: true
          tags: tracedata-frontend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🛡️ Trivy Container Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
        with:
          image-ref: tracedata-frontend:scan
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 8. DAST — OWASP ZAP ──────────────────────────────────────────────────────
  dast-zap:
    name: ☣️ DAST - OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: build
    # Only run against built app on PRs and merges to main
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Start Next.js production server
        working-directory: frontend
        run: |
          nohup npm run start -- -p 3000 &
          echo "Waiting for server to be ready..."
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000 && break
            sleep 2
          done

      - name: Run ZAP Baseline Scan
        run: |
          docker run --network host \
            --user root \
            -v "${{ github.workspace }}:/zap/wrk/:rw" \
            -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:3000 \
            -r zap_report.html || echo "⚠️ ZAP scan completed with findings"

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report.html
          retention-days: 7

  # ── 9. SUMMARY ───────────────────────────────────────────────────────────────
  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, npm-audit, build, codeql-sast, docker-build-push, dast-zap]
    if: always()
    steps:
      - name: Write CI Summary
        run: |
          echo "## Frontend CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Type Check | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm Audit (SCA) | ${{ needs.npm-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL SAST | ${{ needs.codeql-sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build, Scan & Push | ${{ needs.docker-build-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP ZAP DAST | ${{ needs.dast-zap.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Component:** Frontend (Next.js + React + TypeScript)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
