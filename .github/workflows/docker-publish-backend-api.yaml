# Build & push the FastAPI backend image (Docker Hub).
# Uses backend/Dockerfile.backend — same as CI scan.

name: "🐳 Docker Publish — Backend API"

permissions:
  contents: write   # needed to commit the kustomization image tag update

on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "backend/**"
      - ".github/workflows/docker-publish-backend-api.yaml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Extra image tag (optional, e.g. v1.0.0). Always get sha-* and latest on main."
        required: false
        default: ""

env:
  IMAGE_NAME: tracedata-backend-agent-api

jobs:
  docker-publish:
    name: 🐳 Docker Build & Push (Backend API)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  update-kustomization:
    name: 📝 Update kustomization image tag
    runs-on: ubuntu-latest
    needs: [docker-publish]
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA tag
        id: tag
        run: |
          SHA_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          # workflow_dispatch can override with an explicit tag
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            SHA_TAG="${{ github.event.inputs.image_tag }}"
          fi
          echo "value=$SHA_TAG" >> "$GITHUB_OUTPUT"

      - name: Write tag into kustomization.yaml
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          sed -i "s|newTag: \".*\"  # backend-tag|newTag: \"$TAG\"  # backend-tag|" k8s/kustomization.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git diff --cached --quiet && echo "No tag change, skipping commit." && exit 0
          git commit -m "chore(k8s): bump backend image tag to ${{ steps.tag.outputs.value }}"
          git push origin main

  notify-slack:
    name: 📣 Slack Notification
    runs-on: ubuntu-latest
    needs: [docker-publish]
    if: always()
    steps:
      - name: Post Docker publish result to Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_CI_WEBHOOK_URL }}
          PUBLISH_RESULT: ${{ needs.docker-publish.result }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_CI_WEBHOOK_URL not set; skipping notification."
            exit 0
          fi
          STATUS="PASS"
          if [ "$PUBLISH_RESULT" = "failure" ] || [ "$PUBLISH_RESULT" = "cancelled" ]; then
            STATUS="FAIL"
          fi
          RUN_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
          MSG="Docker Publish Backend API: $STATUS | image=$IMAGE_NAME | repo=$REPO | branch=$BRANCH | event=$EVENT | $RUN_URL"
          curl -X POST -H "Content-type: application/json" --data "{\"text\":\"$MSG\"}" "$SLACK_WEBHOOK"
