# Build & push the FastAPI backend image (Docker Hub).
# Uses backend/Dockerfile.api — same as CI scan.

name: "🐳 Docker Publish — Backend API"

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "backend/**"
      - ".github/workflows/docker-publish-backend-api.yaml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Extra image tag (optional, e.g. v1.0.0). Always get sha-* and latest on main."
        required: false
        default: ""

env:
  IMAGE_NAME: tracedata-backend-agent-api

jobs:
  docker-publish:
    name: 🐳 Docker Build & Push (Backend API)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline
