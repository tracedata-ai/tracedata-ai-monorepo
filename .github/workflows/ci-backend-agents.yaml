name: "🤖 CI Backend Agents — Parallel Docker Build"

# ─────────────────────────────────────────────────────────────────────────────
# Triggers on changes to backend agent-related source, the Docker build files,
# this CI file itself, or manually via workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
      - "integration/**"
      - "experiment/**"
    paths:
      - "backend/agents/**"
      - "backend/common/**"
      - "backend/core/**"
      - "backend/tests/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "docker-compose.yml"
      - "backend/Dockerfile"
      - ".github/workflows/ci-backend-agents.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/agents/**"
      - "backend/common/**"
      - "backend/core/**"
      - "backend/tests/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "docker-compose.yml"
      - "backend/Dockerfile"
      - ".github/workflows/ci-backend-agents.yaml"
  workflow_dispatch:

# Cancel in-progress runs for the same branch to avoid wasted compute
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_PYTHON: "3.11"
  WORKING_DIR: backend

# ─────────────────────────────────────────────────────────────────────────────
# JOB DEPENDENCY GRAPH
#
#  lint ──────────────────────┐
#  type-check ────────────────┤
#  unit-test ─────────────────┤──► build ──► docker (Matrix Build → Trivy Scan)
#  security-sca ──────────────┘                               └──► summary
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── JOB 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (with dev extras)
        run: uv sync --frozen --extra dev

      - name: Check lockfile sync
        run: uv lock --check

      - name: Black format check
        run: uv run black --check .

      - name: Ruff lint check
        run: uv run ruff check .

  # ── JOB 2: Type Check ─────────────────────────────────────────────────────
  type-check:
    name: 🔬 Type Check
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (with dev extras)
        run: uv sync --frozen --extra dev

      - name: Mypy static type check
        run: uv run mypy agents tests/agents --ignore-missing-imports --no-error-summary

  # ── JOB 3: Unit Tests ─────────────────────────────────────────────────────
  unit-test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: type-check
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tracedata_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/tracedata_test
      APP_ENV: test
      DEBUG: "false"
      RESET_DB: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (with dev extras)
        run: uv sync --frozen --extra dev

      - name: Run pytest
        run: |
          uv run pytest \
            --cov=agents \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            tests/agents

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-backend-agents
          path: backend/coverage.xml
          retention-days: 7

  # ── JOB 4: Software Composition Analysis (SCA) ───────────────────────────
  security-sca:
    name: 🔐 SCA — pip-audit
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run pip-audit
        run: uvx pip-audit --requirement <(uv export --format requirements-txt --no-dev --no-emit-project)

  # ── 5. BUILD ──────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Backend Agents
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test, security-sca]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (with dev extras)
        run: uv sync --frozen --extra dev

      - name: Compile backend agent modules
        run: uv run python -m compileall agents common core

  # ── 6. DOCKER (Matrix Build → Trivy Scan) ────────────────────────────────
  docker:
    name: 🐳 Docker Agent — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        service:
          - orchestrator
          - safety_worker
          - scoring_worker
          - support_worker
          - sentiment_worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build agent image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: tracedata-agent-${{ matrix.service }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🛡️ Trivy - Scan for CRITICAL & HIGH CVEs
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
        with:
          image-ref: tracedata-agent-${{ matrix.service }}:scan
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  # ── 7. SUMMARY ────────────────────────────────────────────────────────────
  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test, security-sca, build, docker]
    if: always()

    steps:
      - name: Write CI summary
        run: |
          echo "## 🤖 Backend Agents CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧹 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔬 Type Check | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests | ${{ needs.unit-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 SCA (pip-audit) | ${{ needs.security-sca.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker (Matrix Build → Trivy Scan) | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Component:** Backend Agents (Orchestrator, Safety, Scoring, Support, Sentiment)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
