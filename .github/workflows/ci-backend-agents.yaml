name: "🤖 CI Backend Agents — Parallel Docker Build"

# ─────────────────────────────────────────────────────────────────────────────
# Triggers on changes to backend agent-related source, the Docker build files,
# this CI file itself, or manually via workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
      - "integration/**"
      - "experiment/**"
    paths:
      - "backend/agents/**"
      - "backend/common/**"
      - "backend/core/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "docker-compose.yml"
      - "backend/Dockerfile"
      - ".github/workflows/ci-backend-agents.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/agents/**"
      - "backend/common/**"
      - "backend/core/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "docker-compose.yml"
      - "backend/Dockerfile"
      - ".github/workflows/ci-backend-agents.yaml"
  workflow_dispatch:

# Cancel in-progress runs for the same branch to avoid wasted compute
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JOB 1: Parallel Docker builds for all 5 backend agent services ────────
  docker-build-agents:
    name: 🐳 Build Agent Image — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        service:
          - orchestrator
          - safety_worker
          - scoring_worker
          - support_worker
          - sentiment_worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agent image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: tracedata-agent-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── JOB 2: CI Summary (always runs, even on failure) ─────────────────────
  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [docker-build-agents]
    if: always()

    steps:
      - name: Write CI summary
        run: |
          echo "## 🤖 Backend Agents CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Parallel Docker Build (5 Agents) | ${{ needs.docker-build-agents.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Component:** Backend Agents (Orchestrator, Safety, Scoring, Support, Sentiment)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
