name: "🏗️ CI Backend - Build, Lint & Security Scan"

on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_PYTHON: "3.11"

jobs:
  setup:
    name: 📐 Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "latest"
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd ai-agents
          uv sync --frozen

  lint:
    name: 🧪 Lint Code (Ruff & Mypy)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run Ruff Check
        run: |
          cd ai-agents
          uv run ruff check .
      - name: Run MyPy
        run: |
          cd ai-agents
          uv run mypy . --ignore-missing-imports

