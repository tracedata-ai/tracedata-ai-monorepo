name: "CI AI-Agents - Build, Test & Security Scan"

on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  setup:
    name: 📐 Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd ai-agents
          uv sync --frozen

  lint:
    name: 🧪 Lint Code (Ruff & Mypy)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Run Ruff Check
        run: |
          cd ai-agents
          uv run ruff check .
      - name: Run MyPy
        run: |
          cd ai-agents
          uv run mypy . --ignore-missing-imports

  unit-test:
    name: 🧪 Run Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Run tests with coverage
        run: |
          cd ai-agents
          uv run pytest --cov=app --cov-report=xml
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ai-agents/coverage.xml
          retention-days: 7

  build:
    name: 🏗️ Build Backend (Docker)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build Docker image (CI verification)
        uses: docker/build-push-action@v4
        with:
          context: ./ai-agents
          file: ./ai-agents/Dockerfile
          push: false
          tags: ai-agents:ci-${{ github.run_id }}

  security-sca:
    name: 🔐 SCA - UV Pip Audit
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Run UV Pip Audit
        run: |
          cd ai-agents
          # uv pip audit is the equivalent of OWASP/Snyk for UV
          # Note: auditing dependencies for known vulnerabilities
          uv run pip install pip-audit
          uv run pip-audit
