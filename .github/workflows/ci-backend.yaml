name: "🤖 CI Backend - Build & Smoke Test"

on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
    paths:
      - "ai-agents/**"
      - ".github/workflows/ci-backend.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "ai-agents/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  setup:
    name: 🐍 Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ai-agents/requirements.txt

      - name: Install dependencies
        working-directory: ai-agents
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  test:
    name: 🧪 Run Smoke Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ai-agents/requirements.txt

      - name: Install dependencies
        working-directory: ai-agents
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        working-directory: ai-agents
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/test_smoke.py

  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          echo "## Backend CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Component:** AI Middleware (Python 3.11 + FastAPI + LangGraph)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
