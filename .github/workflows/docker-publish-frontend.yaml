# Build & push the Next.js frontend image (Docker Hub).
# Separate from ci-frontend.yaml so you can publish on release branches without re-running tests.

name: "🐳 Docker Publish — Frontend"

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "frontend/**"
      - ".github/workflows/docker-publish-frontend.yaml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Extra image tag (optional, e.g. v1.0.0). Always get sha-* and latest on main."
        required: false
        default: ""

env:
  IMAGE_NAME: tracedata-frontend

jobs:
  docker-publish:
    name: 🐳 Docker Build & Push (Frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8000/api/v1' }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline
