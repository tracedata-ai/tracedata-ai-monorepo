apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tracedata-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tracedata-ai/tracedata-ai-monorepo.git
    targetRevision: main
    path: infra/do/charts/tracedata
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: tracedata
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
