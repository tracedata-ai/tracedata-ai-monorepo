namespace: tracedata

images:
  frontend:
    repository: your-dockerhub-user/tracedata-frontend
    tag: latest
  backend:
    repository: your-dockerhub-user/tracedata-backend-agent-api
    tag: latest

ingress:
  enabled: true
  className: nginx
  frontendHost: tracedata.example.com
  apiHost: api.tracedata.example.com
  tlsSecretFrontend: tracedata-frontend-tls
  tlsSecretApi: tracedata-api-tls

components:
  frontend:
    enabled: true
    kind: Deployment
    replicas: 1
    imageRef: frontend
    containerPort: 3000
    servicePort: 3000
    command: []
  api:
    enabled: true
    kind: Deployment
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: 8000
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
  ingestion:
    enabled: true
    kind: Deployment
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: null
    command: ["python", "-m", "core.ingestion.worker"]
  orchestrator:
    enabled: true
    kind: Deployment
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: null
    command: ["python", "-m", "agents.worker", "orchestrator"]
  safety-worker:
    enabled: true
    kind: Deployment
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: null
    command: ["python", "-m", "agents.worker", "safety_worker"]
  scoring-worker:
    enabled: true
    kind: Deployment
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: null
    command: ["python", "-m", "agents.worker", "scoring_worker"]
  support-worker:
    enabled: true
    kind: Deployment
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: null
    command: ["python", "-m", "agents.worker", "support_worker"]
  sentiment-worker:
    enabled: true
    kind: Deployment
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: null
    command: ["python", "-m", "agents.worker", "sentiment_worker"]

env:
  APP_ENV: production
  LOG_LEVEL: INFO

secretEnv:
  DATABASE_URL: ""
  REDIS_URL: ""
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  SLACK_WEBHOOK_URL: ""
