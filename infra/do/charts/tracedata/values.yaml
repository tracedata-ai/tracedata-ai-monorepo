namespace: tracedata

images:
  frontend:
    repository: your-dockerhub-user/tracedata-frontend
    tag: latest
  backend:
    repository: your-dockerhub-user/tracedata-backend-agent-api
    tag: latest

serviceAccount:
  create: true
  name: ""

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  frontendHost: tracedata.example.com
  apiHost: api.tracedata.example.com
  tlsSecretFrontend: tracedata-frontend-tls
  tlsSecretApi: tracedata-api-tls

monitoring:
  serviceMonitor:
    enabled: true
    namespace: tracedata
    interval: 30s
    scrapeTimeout: 10s
    labels:
      release: kube-prometheus-stack

resilience:
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

components:
  frontend:
    enabled: true
    replicas: 1
    imageRef: frontend
    containerPort: 3000
    servicePort: 3000
    command: []
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    probes:
      enabled: true
      readiness:
        path: /api/metrics
        initialDelaySeconds: 10
        periodSeconds: 15
      liveness:
        path: /api/metrics
        initialDelaySeconds: 30
        periodSeconds: 20
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      cpuUtilization: 75
  api:
    enabled: true
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: 8000
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    probes:
      enabled: true
      readiness:
        path: /health
        initialDelaySeconds: 10
        periodSeconds: 10
      liveness:
        path: /health
        initialDelaySeconds: 30
        periodSeconds: 15
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      cpuUtilization: 70
  ingestion:
    enabled: true
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: null
    command: ["python", "-m", "core.ingestion.worker"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 750m
        memory: 1Gi
    probes:
      enabled: false
      readiness:
        path: /health
        initialDelaySeconds: 20
        periodSeconds: 20
      liveness:
        path: /health
        initialDelaySeconds: 40
        periodSeconds: 30
    hpa:
      enabled: false
  orchestrator:
    enabled: true
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: null
    command: ["python", "-m", "agents.worker", "orchestrator"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1500m
        memory: 2Gi
    probes:
      enabled: false
      readiness:
        path: /health
        initialDelaySeconds: 20
        periodSeconds: 20
      liveness:
        path: /health
        initialDelaySeconds: 40
        periodSeconds: 30
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      cpuUtilization: 70
  safety-worker:
    enabled: true
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: null
    command: ["python", "-m", "agents.worker", "safety_worker"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    probes:
      enabled: false
      readiness:
        path: /health
        initialDelaySeconds: 20
        periodSeconds: 20
      liveness:
        path: /health
        initialDelaySeconds: 40
        periodSeconds: 30
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      cpuUtilization: 70
  scoring-worker:
    enabled: true
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: null
    command: ["python", "-m", "agents.worker", "scoring_worker"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 3Gi
    probes:
      enabled: false
      readiness:
        path: /health
        initialDelaySeconds: 20
        periodSeconds: 20
      liveness:
        path: /health
        initialDelaySeconds: 40
        periodSeconds: 30
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 6
      cpuUtilization: 70
  support-worker:
    enabled: true
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: null
    command: ["python", "-m", "agents.worker", "support_worker"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    probes:
      enabled: false
      readiness:
        path: /health
        initialDelaySeconds: 20
        periodSeconds: 20
      liveness:
        path: /health
        initialDelaySeconds: 40
        periodSeconds: 30
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      cpuUtilization: 70
  sentiment-worker:
    enabled: true
    replicas: 1
    imageRef: backend
    containerPort: 8000
    servicePort: null
    command: ["python", "-m", "agents.worker", "sentiment_worker"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    probes:
      enabled: false
      readiness:
        path: /health
        initialDelaySeconds: 20
        periodSeconds: 20
      liveness:
        path: /health
        initialDelaySeconds: 40
        periodSeconds: 30
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      cpuUtilization: 70

env:
  APP_ENV: production
  LOG_LEVEL: INFO

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: tracedata-cluster-secrets
    kind: ClusterSecretStore
  targetSecretName: tracedata-app-secrets
  # remoteRef keys represent entries in your secret manager.
  keys:
    DATABASE_URL: tracedata/database_url
    REDIS_URL: tracedata/redis_url
    OPENAI_API_KEY: tracedata/openai_api_key
    ANTHROPIC_API_KEY: tracedata/anthropic_api_key
    SLACK_WEBHOOK_URL: tracedata/slack_webhook_url

inlineSecretFallback:
  enabled: false
  secretEnv:
    DATABASE_URL: ""
    REDIS_URL: ""
    OPENAI_API_KEY: ""
    ANTHROPIC_API_KEY: ""
    SLACK_WEBHOOK_URL: ""
