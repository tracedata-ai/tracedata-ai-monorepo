apiVersion: v1
kind: Secret
metadata:
  name: tracedata-app-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secretEnv.DATABASE_URL | quote }}
  REDIS_URL: {{ .Values.secretEnv.REDIS_URL | quote }}
  OPENAI_API_KEY: {{ .Values.secretEnv.OPENAI_API_KEY | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secretEnv.ANTHROPIC_API_KEY | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.secretEnv.SLACK_WEBHOOK_URL | quote }}
