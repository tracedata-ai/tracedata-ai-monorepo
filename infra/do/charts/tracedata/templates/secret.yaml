{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tracedata-app-secrets
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.keys.DATABASE_URL }}
    - secretKey: REDIS_URL
      remoteRef:
        key: {{ .Values.externalSecrets.keys.REDIS_URL }}
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.keys.OPENAI_API_KEY }}
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.keys.ANTHROPIC_API_KEY }}
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: {{ .Values.externalSecrets.keys.SLACK_WEBHOOK_URL }}
{{- else if .Values.inlineSecretFallback.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: tracedata-app-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.inlineSecretFallback.secretEnv.DATABASE_URL | quote }}
  REDIS_URL: {{ .Values.inlineSecretFallback.secretEnv.REDIS_URL | quote }}
  OPENAI_API_KEY: {{ .Values.inlineSecretFallback.secretEnv.OPENAI_API_KEY | quote }}
  ANTHROPIC_API_KEY: {{ .Values.inlineSecretFallback.secretEnv.ANTHROPIC_API_KEY | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.inlineSecretFallback.secretEnv.SLACK_WEBHOOK_URL | quote }}
{{- end }}
