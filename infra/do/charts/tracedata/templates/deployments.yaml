{{- $ns := .Values.namespace -}}
{{- range $name, $cfg := .Values.components }}
{{- if $cfg.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    app: {{ $name }}
spec:
  replicas: {{ $cfg.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      {{- if $.Values.serviceAccount.create }}
      serviceAccountName: {{ default (include "tracedata.fullname" $) $.Values.serviceAccount.name }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ (index $.Values.images $cfg.imageRef).repository }}:{{ (index $.Values.images $cfg.imageRef).tag }}
          imagePullPolicy: IfNotPresent
          {{- if $cfg.command }}
          command:
            {{- range $arg := $cfg.command }}
            - {{ $arg | quote }}
            {{- end }}
          {{- end }}
          env:
            - name: APP_ENV
              value: {{ $.Values.env.APP_ENV | quote }}
            - name: LOG_LEVEL
              value: {{ $.Values.env.LOG_LEVEL | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecrets.targetSecretName }}
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecrets.targetSecretName }}
                  key: REDIS_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecrets.targetSecretName }}
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecrets.targetSecretName }}
                  key: ANTHROPIC_API_KEY
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecrets.targetSecretName }}
                  key: SLACK_WEBHOOK_URL
          ports:
            - containerPort: {{ $cfg.containerPort | default 8000 }}
          {{- if $cfg.resources }}
          resources:
{{ toYaml $cfg.resources | indent 12 }}
          {{- end }}
          {{- if and $cfg.probes $cfg.probes.enabled }}
          readinessProbe:
            httpGet:
              path: {{ $cfg.probes.readiness.path | quote }}
              port: {{ $cfg.containerPort | default 8000 }}
            initialDelaySeconds: {{ $cfg.probes.readiness.initialDelaySeconds | default 10 }}
            periodSeconds: {{ $cfg.probes.readiness.periodSeconds | default 10 }}
          livenessProbe:
            httpGet:
              path: {{ $cfg.probes.liveness.path | quote }}
              port: {{ $cfg.containerPort | default 8000 }}
            initialDelaySeconds: {{ $cfg.probes.liveness.initialDelaySeconds | default 30 }}
            periodSeconds: {{ $cfg.probes.liveness.periodSeconds | default 20 }}
          {{- end }}
---
{{- end }}
{{- end }}
